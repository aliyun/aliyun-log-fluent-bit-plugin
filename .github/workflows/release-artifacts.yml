name: Build Release Artifacts

on:
  pull_request:
  workflow_dispatch:
    inputs:
      fluent_bit_version:
        description: Fluent Bit git tag to build against
        required: true
        default: v3.2.10
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-plugin:
    name: Linux plugin (${{ matrix.target }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: manylinux2014-x86_64
            container: quay.io/pypa/manylinux2014_x86_64
            package_manager: yum
            arch: x86_64
          - target: ubuntu20.04-x86_64
            container: ubuntu:20.04
            package_manager: apt
            arch: x86_64
          - target: ubuntu22.04-x86_64
            container: ubuntu:22.04
            package_manager: apt
            arch: x86_64
          - target: ubuntu24.04-x86_64
            container: ubuntu:24.04
            package_manager: apt
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Resolve Fluent Bit version
        env:
          REQUESTED_FLUENT_BIT_VERSION: ${{ github.event.inputs.fluent_bit_version }}
        run: |
          version="${REQUESTED_FLUENT_BIT_VERSION:-v3.2.10}"
          echo "FLUENT_BIT_VERSION=${version}" >> "$GITHUB_ENV"
          echo "Using Fluent Bit ${version}"

      - name: Build and package in target container
        env:
          TARGET: ${{ matrix.target }}
          PACKAGE_MANAGER: ${{ matrix.package_manager }}
          ARCH: ${{ matrix.arch }}
        run: |
          docker run --rm \
            -e TARGET="$TARGET" \
            -e PACKAGE_MANAGER="$PACKAGE_MANAGER" \
            -e ARCH="$ARCH" \
            -e FLUENT_BIT_VERSION="$FLUENT_BIT_VERSION" \
            -e GITHUB_SHA="$GITHUB_SHA" \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "$PWD:/workspace" \
            -w /workspace \
            "${{ matrix.container }}" \
            bash .github/scripts/build-linux-artifact.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: aliyun-log-fluent-bit-plugin-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 30

  github-release:
    name: Upload GitHub Release assets
    runs-on: ubuntu-24.04
    needs: linux-plugin
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "Release $TAG_NAME"

          gh release upload "$TAG_NAME" release-assets/*.tar.gz release-assets/*.sha256 --clobber
