# Example Fluent Bit configuration for the Aliyun SLS output plugin.
#
# Load the shared object built with ALIYUN_SLS_BUILD_FLUENT_BIT_PLUGIN=ON:
#   fluent-bit -e /path/to/out_aliyun_sls.so -c fluent-bit.conf

[SERVICE]
    flush        5
    log_level    info
    # Expose custom SLS metrics (fluentbit_output_sls_records_total, ...)
    http_server  on
    http_listen  0.0.0.0
    http_port    2020

[INPUT]
    name         dummy
    tag          app.demo
    dummy        {"message": "hello sls", "level": "info"}

[OUTPUT]
    name                     aliyun_sls
    match                    *
    endpoint                 cn-hangzhou.log.aliyuncs.com
    project                  my-project
    logstore                 my-logstore
    access_key_id            ${ALIYUN_SLS_ACCESS_ID}
    access_key_secret        ${ALIYUN_SLS_ACCESS_KEY}
    topic                    fluent-bit
    # source defaults to the record tag when omitted
    # hash_key               my-key            # enables KeyHash write mode

    # Batching (default shown)
    max_raw_bytes_per_batch  5242880

    # Networking is handled by Fluent Bit's own stack: TLS, keepalive and
    # timeouts below are honoured because the plugin uses flb_upstream.
    tls                      on
    tls.verify               on
    net.keepalive            on
    net.connect_timeout      10

    # Run several flush workers; the shared upstream connection pool is safe
    # across workers.
    workers                  2

    # Retry policy is delegated to the Fluent Bit scheduler.
    retry_limit              5
